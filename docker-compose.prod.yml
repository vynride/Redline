# Production — standalone compose for redline.vynride.dev.
# Run with: docker compose -f docker-compose.prod.yml up -d --build
#
# nginx on the host reverse-proxies:
#   /api/*  → 127.0.0.1:8002 (backend)
#   /ws/*   → 127.0.0.1:8002 (backend, WS upgrade)
#   /*      → 127.0.0.1:3002 (frontend)
#
# This app does NOT run its own Postgres. The backend joins the pre-existing external
# Docker network `backend` and connects to a Postgres already running on it. All
# secrets live in backend/.env on the server (never committed); that file must define
# DATABASE_URL (pointing at that Postgres host), JWT_SECRET, the Sarvam key, and the
# OAuth client IDs/secrets — see backend/.env.example.
services:
  backend:
    build: ./backend
    environment:
      CORS_ORIGINS: https://redline.vynride.dev
      FRONTEND_URL: https://redline.vynride.dev
      OAUTH_REDIRECT_BASE: https://redline.vynride.dev
      ENVIRONMENT: production
      DEBUG: "false"
      # DATABASE_URL and JWT_SECRET come from backend/.env (env_file below).
    env_file:
      - path: ./backend/.env
        required: true
    ports:
      - "127.0.0.1:8002:8000"
    networks:
      - default   # published port + outbound (Sarvam API/STT/TTS)
      - backend    # reach the external Postgres by its service name
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: https://redline.vynride.dev
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3002:3000"
    restart: unless-stopped

networks:
  # Pre-existing network from your Postgres deployment — created outside this app.
  # Create it once if it doesn't exist:  docker network create backend
  backend:
    external: true
