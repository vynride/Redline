# Production — standalone compose for redline.vynride.dev.
# Run with: docker compose -f docker-compose.prod.yml up -d --build
#
# nginx on the host reverse-proxies:
#   /api/*  → 127.0.0.1:8002 (backend)
#   /ws/*   → 127.0.0.1:8002 (backend, WS upgrade)
#   /*      → 127.0.0.1:3002 (frontend)
#
# All secrets live in backend/.env on the server (never committed). That file must
# define DATABASE_URL (Postgres, pointing at the `db` service), POSTGRES_PASSWORD
# (matching the password in DATABASE_URL), and JWT_SECRET — see backend/.env.example.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: redline
      POSTGRES_DB: redline
      # POSTGRES_PASSWORD is supplied by backend/.env (env_file below).
    env_file:
      - path: ./backend/.env
        required: true
    volumes:
      - redline_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redline"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      CORS_ORIGINS: https://redline.vynride.dev
      FRONTEND_URL: https://redline.vynride.dev
      OAUTH_REDIRECT_BASE: https://redline.vynride.dev
      ENVIRONMENT: production
      DEBUG: "false"
      # DATABASE_URL and JWT_SECRET come from backend/.env (env_file below).
    env_file:
      - path: ./backend/.env
        required: true
    ports:
      - "127.0.0.1:8002:8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: https://redline.vynride.dev
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3002:3000"
    restart: unless-stopped

volumes:
  redline_pgdata:
