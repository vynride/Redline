# Production — standalone compose for redline.vynride.dev.
# Run with: docker compose -f docker-compose.prod.yml up -d --build
#
# nginx on the host reverse-proxies:
#   /api/*  → 127.0.0.1:8002 (backend)
#   /ws/*   → 127.0.0.1:8002 (backend, WS upgrade)
#   /*      → 127.0.0.1:3002 (frontend)
#
# Secrets go in backend/.env on the server (never committed). The Postgres password
# is read from POSTGRES_PASSWORD in a root .env file beside this compose (also never
# committed) — see .env.example. JWT_SECRET comes from backend/.env.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: redline
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in the root .env on the server}
      POSTGRES_DB: redline
    volumes:
      - redline_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redline"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Password comes from the root .env; JWT_SECRET is provided by backend/.env below.
      DATABASE_URL: postgresql+psycopg2://redline:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in the root .env on the server}@db:5432/redline
      CORS_ORIGINS: https://redline.vynride.dev
      FRONTEND_URL: https://redline.vynride.dev
      OAUTH_REDIRECT_BASE: https://redline.vynride.dev
      ENVIRONMENT: production
      DEBUG: "false"
    env_file:
      - path: ./backend/.env
        required: true
    ports:
      - "127.0.0.1:8002:8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: https://redline.vynride.dev
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3002:3000"
    restart: unless-stopped

volumes:
  redline_pgdata:
