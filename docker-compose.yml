# Redline — local orchestration.
#
# Every published port is bound to 127.0.0.1 so nothing is ever exposed on a
# public interface — Docker's port publishing bypasses host firewalls (UFW),
# so the loopback bind is the actual safeguard. Do NOT change these to 0.0.0.0.
# Production runs the standalone docker-compose.prod.yml, never this file.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: redline
      POSTGRES_DB: redline
      # POSTGRES_PASSWORD is supplied by backend/.env (env_file below). Never ship a known password.
    env_file:
      - path: ./backend/.env
        required: true
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - redline_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redline"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      CORS_ORIGINS: http://localhost:3000
      FRONTEND_URL: http://localhost:3000
      OAUTH_REDIRECT_BASE: http://localhost:8000
    # DATABASE_URL (Postgres, pointing at the `db` service), JWT_SECRET, the Sarvam
    # key, and OAuth client IDs/secrets all come from backend/.env — not committed.
    env_file:
      - path: ./backend/.env
        required: true
    ports:
      - "127.0.0.1:8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  redline_pgdata:
