# Redline — local orchestration.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: redline
      POSTGRES_PASSWORD: redline
      POSTGRES_DB: redline
    ports:
      - "5432:5432"
    volumes:
      - redline_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redline"]
      interval: 5s
      timeout: 5s
      retries: 5

  # backend and frontend services are added as they come online.

volumes:
  redline_pgdata:
