# Redline — local orchestration.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: redline
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-redline}
      POSTGRES_DB: redline
    ports:
      - "5432:5432"
    volumes:
      - redline_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redline"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://redline:${POSTGRES_PASSWORD:-redline}@db:5432/redline
      CORS_ORIGINS: http://localhost:3000
      FRONTEND_URL: http://localhost:3000
      OAUTH_REDIRECT_BASE: http://localhost:8000
    # JWT_SECRET and the third-party secrets (Sarvam) and OAuth client IDs/secrets
    # live in backend/.env — not committed.
    env_file:
      - path: ./backend/.env
        required: false
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  redline_pgdata:
