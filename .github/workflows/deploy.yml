name: Deploy
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare SSH key
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          install -m 700 -d "${{ github.workspace }}/.tmp_ssh"
          printf '%s' "$SSH_KEY" | sed 's/\\n/\n/g' > "${{ github.workspace }}/.tmp_ssh/deploy_key"
          chmod 600 "${{ github.workspace }}/.tmp_ssh/deploy_key"
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key_path: ${{ github.workspace }}/.tmp_ssh/deploy_key
          script: |
            cd /root/redline
            git pull
            docker compose -f docker-compose.prod.yml up -d --build
            docker image prune -f
            docker container prune -f
            docker volume prune -f
      - name: Cleanup SSH key
        if: always()
        run: rm -rf "${{ github.workspace }}/.tmp_ssh"
