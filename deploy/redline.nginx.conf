# Redline — nginx reverse proxy for redline.vynride.dev
#
# Terminates TLS and proxies to the two loopback-bound containers:
#   /api/*  -> 127.0.0.1:8002  (backend REST)
#   /ws/*   -> 127.0.0.1:8002  (backend WebSocket, drill audio)
#   /*      -> 127.0.0.1:3002  (Next.js frontend)
#
# Install:
#   sudo cp deploy/redline.nginx.conf /etc/nginx/sites-available/redline.vynride.dev
#   sudo certbot certonly --nginx -d redline.vynride.dev      # obtain the cert first
#   sudo ln -sf /etc/nginx/sites-available/redline.vynride.dev /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot renew --dry-run                              # confirm auto-renewal

# --- HTTP: ACME challenge + redirect everything to HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name redline.vynride.dev;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name redline.vynride.dev;

    server_tokens off;

    # TLS (Let's Encrypt / certbot)
    ssl_certificate     /etc/letsencrypt/live/redline.vynride.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/redline.vynride.dev/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # Edge security headers. HSTS + nosniff are owned here (strip any upstream copy so
    # they aren't duplicated); CSP, X-Frame-Options, Referrer-Policy and Permissions-Policy
    # are set route-aware by the Next.js app and pass through untouched.
    proxy_hide_header Strict-Transport-Security;
    proxy_hide_header X-Content-Type-Options;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Audio uploads / debrief payloads
    client_max_body_size 12m;

    # Backend REST
    location /api/ {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend WebSocket (long-lived drill sessions)
    location /ws/ {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # Next.js frontend
    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}
